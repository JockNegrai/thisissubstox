<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SubStox — Inventory Intelligence</title>
<style>
/* ── NANO BANANA 2 DESIGN SYSTEM ── */
:root {
  /* Deep Pro Dark Palette */
  --bg: #07111F;
  --bg-glow: radial-gradient(circle at 50% 0%, #112240 0%, #07111F 100%);
  --surface: rgba(255, 255, 255, 0.04);
  --surface-border: rgba(255, 255, 255, 0.1);
  --surface-hover: rgba(255, 255, 255, 0.08);
  
  /* Brand Accents */
  --accent: #2563EB; /* Electric Blue */
  --accent-alt: #F97316; /* Sunset Orange */
  --text: #FFFFFF;
  --text-muted: #94A3B8;
  
  --shadow-glow: 0 0 25px rgba(37, 99, 235, 0.15);
  --radius: 16px;
  --font: 'Inter', sans-serif;
}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  background-image: var(--bg-glow);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
}

/* ── UNIQUE BRAND LOGO ── */
.brand-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent-alt));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-glow);
}

/* ── PROFESSIONAL GLASS CARDS ── */
.card, .kpi-card, .tbl-wrap {
  background: var(--surface);
  backdrop-filter: blur(12px);
  border: 1px solid var(--surface-border);
  border-radius: var(--radius);
  transition: all 0.3s ease;
}
.kpi-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: var(--shadow-glow);
}

/* ── NAVIGATION (Sidebar) ── */
#sidebar {
  width: 240px;
  background: rgba(7, 17, 31, 0.8);
  border-right: 1px solid var(--surface-border);
  padding: 20px;
}
.sb-item {
  color: var(--text-muted);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 4px;
  cursor: pointer;
}
.sb-item.active {
  background: rgba(37, 99, 235, 0.15);
  color: #fff;
  border: 1px solid rgba(37, 99, 235, 0.3);
}

/* ── BUTTONS & HEADINGS ── */
.ph-title span {
  background: linear-gradient(to right, #60A5FA, #F97316);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.btn-primary {
  background: linear-gradient(135deg, #2563EB, #1D4ED8);
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  color: white;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
}
</style>
</head>
<body>

<div id="app" style="display: flex;">
  <div id="sidebar">
    <div class="brand-logo" style="margin-bottom: 30px;">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M12 20V10M18 20V4M6 20v-4" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 style="font-size: 18px; font-weight: 800;">SubStox</h1>
    </div>
    <div class="sb-item active">Dashboard</div>
    <div class="sb-item">Inventory</div>
    <div class="sb-item">Suppliers</div>
  </div>

  <div id="main" style="flex: 1; padding: 40px;">
    <div class="ph">
      <h1 class="ph-title">Take Control of <span>Your Subscriptions</span></h1>
      <p style="color: var(--text-muted); margin-top: 10px;">Professional inventory intelligence powered by Nano Banana 2.</p>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px;">
      <div class="kpi-card" style="padding: 24px;">
        <span style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Active SKUs</span>
        <div style="font-size: 32px; font-weight: 800; margin-top: 10px;">1,284</div>
      </div>
      <div class="kpi-card" style="padding: 24px;">
        <span style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Monthly Spend</span>
        <div style="font-size: 32px; font-weight: 800; margin-top: 10px; color: #60A5FA;">$12.4k</div>
      </div>
      <div class="kpi-card" style="padding: 24px;">
        <span style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Optimization Score</span>
        <div style="font-size: 32px; font-weight: 800; margin-top: 10px; color: #F97316;">94%</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
